<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription - IFRI Comotorage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background-color: #f3f4f6; }
    .container { display: flex; flex-direction: column; }
    @media (min-width: 768px) { .container { flex-direction: row; } }
    .left {
      flex: 1; background-color: #dbeafe; padding: 2rem; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .left img { width: 90%; max-width: 480px; margin-bottom: 1rem; }
    .right {
      flex: 2; background-color: white; display: flex; justify-content: center; align-items: center;
      padding: 2rem;
    }
    form {
      width: 100%; max-width: 700px; background: #fff; padding: 2rem; border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; color: #1e40af; }
    .input, select {
      width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 1rem;
    }
    .radio-container { display: flex; justify-content: space-around; margin-bottom: 1rem; }
    button {
      width: 100%; background-color: #2563eb; color: white; padding: 12px;
      border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
    }
    .conditions {
      display: flex; align-items: center; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAlgAAAGQCAIAAAD9V4nPAAAG3UlEQVR4nO3ZsU7jQ..." alt="Inscription IFRI">
      <h1>Créer un compte</h1>
      <p>Inscrivez-vous pour proposer ou réserver un trajet entre camarades IFRI.</p>
    </div>
    <div class="right">
      <form>
        <h2>Inscription IFRI Comotorage</h2>

        <label>Nom</label>
        <input type="text" class="input">

        <label>Prénom</label>
        <input type="text" class="input">

        <label>Email</label>
        <input type="email" class="input">

        <label>Téléphone</label>
        <input type="tel" class="input">

        <label>Mot de passe</label>
        <input type="password" class="input">

        <label>Choisir votre rôle</label>
        <div class="radio-container">
          <label><input type="radio" name="role" value="conducteur"> Conducteur</label>
          <label><input type="radio" name="role" value="passager"> Passager</label>
        </div>

        <div class="conditions">
          <input type="checkbox" id="conditions" name="conditions" required>
          <label for="conditions" style="margin-left: 8px;">J'accepte les conditions d'utilisation</label>
        </div>

        <button type="submit">S'inscrire</button>
      </form>
    </div>
  </div>
</body>
</html>
