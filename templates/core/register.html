<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - CovoitCampus</title>
    <link rel="stylesheet" href="../../static/css/register.css">
    <script src="../../static/js/register.js" defer></script>
</head>
<body class="register-body">
    <div class="register-container">
        <div class="illustration">
            <img src="../../static/images/illustration_register.png" alt="Inscription Illustration">
        </div>
        <form method="POST" class="register-form" enctype="multipart/form-data">
            <h2>Créer un compte</h2>
            <input type="text" name="nom" placeholder="Nom" required>
            <input type="text" name="prenom" placeholder="Prénom" required>
            <input type="email" name="email" placeholder="Email" required id="email">
            <small id="email-message" class="error"></small>

            <input type="tel" name="telephone" placeholder="Téléphone" required>
            
            <input type="file" name="photo_profil" accept="image/*">

            <input type="password" name="mot_de_passe" placeholder="Mot de passe" required id="password">
            <small id="password-rules">8-15 caractères, lettres, chiffres, 1 caractère spécial</small>
            <input type="checkbox" onclick="togglePassword()"> Afficher le mot de passe

            <select name="role" id="role" onchange="toggleConducteurFields()" required>
                <option value="">-- Sélectionnez un rôle --</option>
                <option value="conducteur">Conducteur</option>
                <option value="passager">Passager</option>
            </select>

            <div id="conducteur-fields" style="display:none;">
                <input type="text" name="marque_voiture" placeholder="Marque du véhicule">
                <input type="text" name="modele_voiture" placeholder="Modèle du véhicule">
                <input type="number" name="nb_places" placeholder="Nombre de places" min="1" max="10">
            </div>

            <button type="submit">S'inscrire</button>
        </form>
    </div>
</body>
</html>
