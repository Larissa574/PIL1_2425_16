<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Covoiturage</title>
    <link rel="stylesheet" href="../../static/css/offers.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/fontawesome-free@6.5.0/css/svg-with-js.min.css">
</head>
<body>
    <!-- Barre supérieure -->
    <div class="barre-haut">
        <span class="icone-haut" title="Notifications"><i class="fas fa-bell"></i></span>
        <span class="icone-haut" title="Historique"><i class="fas fa-history"></i></span>
        <span class="icone-haut" title="Trajet"><i class="fas fa-map-marker-alt"></i></span>
        <span class="statut-haut">Statut : <span class="statut-en-ligne">En ligne</span></span>
    </div>
    <div class="conteneur">
        <div class="barre-laterale">
            <div class="section-profil">
                <div class="conteneur-image-profil">
                    <img src="../../static/css/images/defaut_profile.png" alt="Photo de profil" class="image-profil">
                </div>
                <h3>Mon Espace</h3>
            </div>
            <div class="menu-navigation">
                <a href="#" class="menu-item"><i class="fas fa-user"></i>Information</a>
                <a href="#" class="menu-item"><i class="fas fa-clock"></i>Publier une offre</a>
                <a href="#" class="menu-item"><i class="fas fa-calendar"></i>publier une demande</a>
                <a href="#" class="menu-item"><i class="fas fa-car"></i>Messagerie</a>
                <a href="#" class="menu-item"><i class="fas fa-cog"></i> Paramètres</a>
                <a href="#" class="menu-item"><i class="fas fa-user-friends"></i> statut de compt</a>
            </div>
            <button class="bouton-principal">Deconnexion</button>
       

  
  
    </div>

    
    

    <script src="../../static/js/offers.js"></script>
</body>
</html>
